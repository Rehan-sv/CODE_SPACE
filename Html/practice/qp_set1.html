<!DOCTYPE html>
<html>
<head>
<title>Form Validation</title>

<script>
function validateForm(){

var name=document.getElementById("name").value;
var email=document.getElementById("email").value;
var password=document.getElementById("password").value;
var dob=document.getElementById("dob").value;

var emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
var passPattern=/^(?=.*[A-Z])(?=.*\d).{6,}$/;

if(name==""){
alert("Name cannot be empty");
return false;
}

if(!email.match(emailPattern)){
alert("Invalid Email");
return false;
}

if(!password.match(passPattern)){
alert("Password must contain uppercase and number");
return false;
}

var year=new Date(dob).getFullYear();
var current=new Date().getFullYear();

if(year<1900 || year>current){
alert("Enter valid Date of Birth");
return false;
}

return true;
}

function countChars(){
var text=document.getElementById("comments").value;
document.getElementById("count").innerHTML=text.length+"/50";

if(text.length>50){
alert("Maximum 50 characters allowed");
}
}
</script>

</head>

<body>

<form onsubmit="return validateForm()">

Name:
<input type="text" id="name"><br><br>

Email:
<input type="text" id="email"><br><br>

Password:
<input type="password" id="password"><br><br>

Date of Birth:
<input type="date" id="dob"><br><br>

Upload File:
<input type="file"><br><br>

Comments:
<textarea id="comments" onkeyup="countChars()" maxlength="50"></textarea>
<br>
<span id="count">0/50</span>

<br><br>

<input type="submit" value="Submit">

</form>

</body>
</html>
