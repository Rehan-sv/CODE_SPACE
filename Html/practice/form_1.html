<html>
<head>
<script>
function validate(){
    if(document.myform.Name.value == ""){
        alert("You have left it blank");
        return false;
    }
}
</script>
</head>

<body>

<form name="myform" onsubmit="validate()">
<input type="text" name="Name">
<input type="submit" value="Submit">

</form>

</body>
</html>
