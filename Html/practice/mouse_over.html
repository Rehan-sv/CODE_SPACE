<html>
    <body>
        <h1> HTML.DOM EVENTS</h1>
        <h2> the onmouseOver event </h2>
        <img onmouseover="big(this)"
        onmouseout="small(this)"
        srs="big.jpeg" border="0" height="50px" width="50px"
        <p>
            The function bigImg() is triggered when the user moves the mouse pointer over the image 
        </p>

        <p>
            The function normalImg() is triggered when the mouse pointer is moved out of the image 
        </p>
        <script>
        function bigImg(x){
            x.style.height="64px";
            x.style.width="64px";
        }
        function normalImg(x){
            x.style.height="32px";
            x.style.width="32px";
        }
        </script>
    </body>
</html>
