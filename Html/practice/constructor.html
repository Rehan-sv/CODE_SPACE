<html>
      <head>
            <title>User-defined  objects</title>          
            <script  type  =  "text/javascript">
                  var  book  =  new  Object();      
                  book.subject  =  "C  Programming";    
                  book.author    =  "Dennis  Ritchie";
            </script>            
      </head>
      
      <body>    
            <script  type  =  "text/javascript">
                  document.write("Book  name  is  :  "  +  book.subject  +  "<br>");
                  document.write("Book  author  is  :  "  +  book.author  +  "<br>");
            </script>      
      </body>
</html>
