<html>
<style>

form{
width:300px;
margin:auto;

input{

    <body>
        <fieldset>
            <legend>Details</legend>
        <form name="myform" onsubmit=" return validateform()">
            <label for=""> name </label>
            <input type="text" id="name">
            <label> ID </label>
            <input type="text" id="id" placeholder="CS-2024">
            <label>email</label>
            <input type="text" id="email" onblur="validateEmail()">
            <p id="emailMsg"></p>
            <label>course code  </label>
            <input type="text" id="course" onfocus="showHint()">
            <p id="hint"></p>
            <label>Exam Date</label>
            <input type="date" id="date">
            <input type="submit" id="Submit">
        </form>
        </fieldset>
        <script>
            function showHint(){
                document.getElementById("hint").innerHTML=  "Format: Two uppercase letters followed by 3 or 4 digits (e.g., CS101)"
            }
            function validateEmail(){
                var email_value=document.getElementById("email").value;
                var pattern=/^[^]+@[^]+\.[a-z]{2,3}$/

                if(pattern.test(email_value)){
                    document.getElementById("emailMsg").innerHTML="Valid in/p !!!!";
                }
                else{
                    document.getElementById("emailMsg").innerHTML=" not Valid in/p !!!!";
                }
            }

            function validateform(){
                var name =document.getElementById("name").value;
                var id=document.getElementById("id").value;
                var email=document.getElementById("email"). value;
                var course=document.getElementById("course").value;
                var date=document.getElementById("date").value;

                if(name=="" || id=="" || email=="" || course=="" || date==""){
                    alert("Enter all the val")
                    return false;
                }
                var coursePattern=/^[A-Z]{2}[0-9]{3,4}$/;
                var idPattern=/^[A-Z]{2}-[0-9]{4}$/;
                if(!coursePattern.test(course)){
                alert("Invalid Course Code");
                return false;

                }

                if(!idPattern.test(id)){
                alert("Invalid Student ID format");
                return false;
                }

                alert("Form submitted successfully!");{
                    return true;

                }
            }   



        </script>
    </body>
</html>
