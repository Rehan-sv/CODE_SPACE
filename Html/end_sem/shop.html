<html>

<head>

<title>Shopping Cart</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align: center;}
table{
    display: flex;
justify-content: center
}


td{
padding:20px;
border:1px solid black;
background:white;
}

button{

background:green;
color:white;
padding: 10px;
}

</style>

</head>

<body>

<h1>Shopping Cart</h1>

<table>

<tr>

<td>

<h3>Laptop</h3>

<p>₹50000</p>

<button onclick="addItem('Laptop',50000)">
Add to Cart
</button>

</td>

<td>
    

<h3>Mobile</h3>

<p>₹20000</p>

<button onclick="addItem('Mobile',20000)">
Add to Cart
</button>

</td>

</tr>

<tr>

<td>

<h3>Headphone</h3>

<p>₹3000</p>

<button onclick="addItem('Headphone',3000)">
Add to Cart
</button>

</td>

<td>

<h3>Keyboard</h3>

<p>₹1500</p>

<button onclick="addItem('Keyboard',1500)">
Add to Cart
</button>

</td>

</tr>

</table>

<h2>Cart Items</h2>

<div id="cartitems"></div>

<h2>Total Amount : ₹<span id="total">0</span></h2>

<script>

let total=0;

function addItem(name,price)
{
    document.getElementById("cartitems").innerHTML +=
    "<p>"+name+" -> ₹"+price+"</p>";

    total = total + price;

    document.getElementById("total").innerHTML = total;
}

</script>

</body>

</html>
