<html>

<style>

body{
font-family:Arial;
background:#f4f4f4;
}

form{
width:350px;
margin:auto;
background:white;
padding:20px;
border-radius:5px;
}

input{
width:100%;
padding:6px;
margin:5px 0;
}

span{
color:red;
font-size:12px;
}

.valid{
border:2px solid green;
}

.invalid{
border:2px solid red;
}

</style>

<body>

<form onsubmit="return validate()">

<label>Name :</label>
<input type="text" id="name" placeholder="Enter name">
<span id="name_error"></span>

<label>Email :</label>
<input type="text" id="email">
<span id="email_error"></span>

<label>Age :</label>
<input type="number" id="age">
<span id="age_error"></span>

<label>Phone :</label>
<input type="text" id="num">
<span id="num_error"></span>

<input type="submit">

<input type="reset">

</form>

<script>

function validate(){

    var name=document.getElementById("name");
    var email=document.getElementById("email");
    var age=document.getElementById("age");
    var number=document.getElementById("num");

    var epattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    var p_number=/^[0-9]{10}$/;

    // NAME VALIDATION

    if(name.value==""){
        document.getElementById("name_error").innerHTML="Enter name";
        name.className="invalid";
        return false;
    }

    else if(name.value.length<3){
        document.getElementById("name_error").innerHTML="Minimum 3 characters";
        name.className="invalid";
        return false;
    }

    else{
        document.getElementById("name_error").innerHTML="";
        name.className="valid";
    }

    // EMAIL VALIDATION

    if(email.value==""){
        document.getElementById("email_error").innerHTML="Enter email";
        email.className="invalid";
        return false;
    }

    else if(!epattern.test(email.value)){
        document.getElementById("email_error").innerHTML="Invalid email";
        email.className="invalid";
        return false;
    }

    else{
        document.getElementById("email_error").innerHTML="";
        email.className="valid";
    }

    // AGE VALIDATION

    if(age.value==""){
        document.getElementById("age_error").innerHTML="Enter age";
        age.className="invalid";
        return false;
    }

    else if(age.value<18 || age.value>60){
        document.getElementById("age_error").innerHTML="Age must be 18-60";
        age.className="invalid";
        return false;
    }

    else{
        document.getElementById("age_error").innerHTML="";
        age.className="valid";
    }

    // PHONE VALIDATION

    if(number.value==""){
        document.getElementById("num_error").innerHTML="Enter number";
        number.className="invalid";
        return false;
    }

    else if(!p_number.test(number.value)){
        document.getElementById("num_error").innerHTML="Enter 10 digits";
        number.className="invalid";
        return false;
    }

    else{
        document.getElementById("num_error").innerHTML="";
        number.className="valid";
    }

    return true;
}

</script>

</body>

</html>
