<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f2f2;
        }

        .container{
            width:800px;
            margin:auto;
            margin-top:30px;
        }

        table{
            width:100%;
        }

        td{
            text-align:center;
            padding:20px;
            background:white;
        }

        img{
            width:150px;
            height:150px;
        }

        .addbtn{
            padding:10px;
            background:green;
            color:white;
            border:none;
        }

        .removebtn{
            padding:8px;
            background:red;
            color:white;
            border:none;
        }

        #cart{
            margin-top:30px;
            width:100%;
            border-collapse:collapse;
        }

        #cart th,#cart td{
            border:1px solid black;
            padding:10px;
            text-align:center;
        }

    </style>
</head>

<body>

<div class="container">

<h2 align="center">Shopping Cart</h2>

<table>

<tr>

<td>
    <img src="https://via.placeholder.com/150">
    <h3>Headphone</h3>
    <p>Price : 500</p>
    <button class="addbtn"
    onclick="addItem('Headphone',500)">
    Add Cart
    </button>
</td>

<td>
    <img src="https://via.placeholder.com/150">
    <h3>Keyboard</h3>
    <p>Price : 1000</p>
    <button class="addbtn"
    onclick="addItem('Keyboard',1000)">
    Add Cart
    </button>
</td>

</tr>

<tr>

<td>
    <img src="https://via.placeholder.com/150">
    <h3>Mouse</h3>
    <p>Price : 700</p>
    <button class="addbtn"
    onclick="addItem('Mouse',700)">
    Add Cart
    </button>
</td>

<td>
    <img src="https://via.placeholder.com/150">
    <h3>Speaker</h3>
    <p>Price : 1500</p>
    <button class="addbtn"
    onclick="addItem('Speaker',1500)">
    Add Cart
    </button>
</td>

</tr>

</table>

<table id="cart">

<tr>
    <th>Item</th>

</tr>

</table>

<h2 id="total">Total : 0</h2>

</div>

<script>

var total=0;

function addItem(name,price)
{
    document.getElementById("cart").innerHTML +=
    "<p>"+name+" - "+price;

    total = total + price;

    document.getElementById("total").innerHTML =
    "Total : " + total;
}


</script>

</body>
</html>
