<!DOCTYPE html>

<html>

<head>

<title>Smart Home Energy</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
}

form{
width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;

animation:slide 1s;
}

@keyframes slide{

from{
margin-left:-500px;
}

to{
margin-left:auto;
}

}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
}

button{
padding:10px;
background:green;
color:white;
border:none;
border-radius:5px;
}

button:hover{
background:darkgreen;
}

.low{
background:lightgreen;
}

.high{
background:salmon;
}

table{
width:400px;
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid black;
padding:10px;
text-align:center;
}

tr:hover{
background:yellow;
}

</style>

</head>

<body>

<h1 align="center">Smart Home Energy</h1>

<form onsubmit="return validateForm()">

<label>Device Name</label>

<select id="device">

<option>AC</option>

<option>Heater</option>

<option>Washing Machine</option>

<option>Fan</option>

</select>

<label>Power Mode</label><br>

<input type="radio"
name="mode"
value="Eco"
required
onchange="cost()">Eco

<input type="radio"
name="mode"
value="Normal"
onchange="cost()">Normal

<input type="radio"
name="mode"
value="High"
onchange="cost()">High

<p id="cost"></p>

<label>Time Usage (Minutes)</label>

<input type="number"
id="time">

<label>Notes</label>

<textarea></textarea>

<label>Budget Limit</label>

<input type="range"
min="10"
max="500"
value="100"
id="budget"
onchange="showBudget()">

<p id="budgetValue"></p>

<p id="tip"></p>

<button type="submit">Submit</button>

<button type="reset">Reset</button>

</form>

<table>

<tr>
<th>Device</th>
<th>Status</th>
</tr>

<tr>
<td>AC</td>
<td class="high">High Usage</td>
</tr>

<tr>
<td>Fan</td>
<td class="low">Low Usage</td>
</tr>

</table>

<script>

function cost()
{
    var mode=document.querySelector(
    'input[name="mode"]:checked').value;

    var amount=0;

    if(mode=="Eco")
    {
        amount=50;
    }

    else if(mode=="Normal")
    {
        amount=100;
    }

    else
    {
        amount=200;
    }

    document.getElementById("cost").innerHTML=
    "Estimated Cost : $" + amount;

    if(mode=="High")
    {
        document.getElementById("tip").innerHTML=
        "⚡ Use Eco Mode To Save Energy";
    }
    else
    {
        document.getElementById("tip").innerHTML="";
    }
}

function showBudget()
{
    var budget=document.getElementById("budget").value;

    document.getElementById("budgetValue").innerHTML=
    "Budget : $" + budget;
}

function validateForm()
{
    var time=document.getElementById("time").value;

    var budget=document.getElementById("budget").value;

    if(time<10 || time>600)
    {
        alert("Time must be between 10 and 600 minutes");

        return false;
    }

    if(budget>500)
    {
        alert("Budget cannot exceed $500");

        return false;
    }

    alert("Settings Saved");

    return true;
}

</script>

</body>

</html>
