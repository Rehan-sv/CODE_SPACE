<html>
    <head>
        <script>
            function validate(){
                if (document.myform.name.value=="")
                alert("U have left name as blank")
            }
        </script>
    </head>
    <body>
        <form name="myform" onsubmit="validate()">
            <input type="text" name="Name">
            <input type="submit" name="Submit">

        </form>
    </body>
</html>
